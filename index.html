<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mis 15 - Juliana</title>

<style>
    body {
        margin: 0;
        font-family: 'Arial', sans-serif;
        text-align: center;
        color: rgba(255, 255, 255, 0.979);
        background: linear-gradient(180deg, #e75480, #2c003e);
        overflow-x: hidden;
    }

    .container {
        padding: 40px 20px;
    }

    h1 {
        font-size: 3em;
        margin-top: 50px;
        color: black;
    }

    .stars {
        position: fixed;
        width: 100%;
        height: 100%;
        background: url('img/fondo.jpeg');
        //animation: moveStars 20s linear infinite;
        z-index: -1;
    }


    @keyframes moveStars {
        from {background-position: 0 0;}
        to {background-position: 1000px 1000px;}
    }

    .card {
        margin: 30px auto;
        padding: 20px;
        max-width: 400px;
        background: rgba(255, 255, 255, 0.699);
        border-radius: 15px;
        backdrop-filter: blur(10px);
        color: black;
    }

    .btn {
        display: inline-block;
        margin: 10px;
        padding: 12px 20px;
        background: #ff85a2;
        color: rgba(255, 255, 255, 0.925);
        border-radius: 20px;
        text-decoration: none;
        font-weight: bold;
    }

    .btn:hover {
     
        background: #b9adb0d3;
    }

    .countdown {
        font-size: 1.5em;
        margin-top: 20px;
    }
</style>
</head>

<body>

<div class="stars"></div>

<div class="container">

    <h1>✨ Mis 15 ✨</h1>
    <h4>Una noche mágica bajo las estrellas</h4>

    <div class="card">
        <h2>Juliana 💖</h2>
        <h4>Te invito a celebrar este momento único</h4>
    </div>

    <div class="card">
        <h4>📅 16 de Enero</h4>
        <h4>🕒 21:00 hs</h4>
        <h4>📍 Salón atsa ATSA</h4>
    </div>

   <div class="card">
    <h4>🌸 ¿Qué música te gustaría escuchar esa noche?</h4>

    <textarea id="mensaje" placeholder="Escribí tu canción..."></textarea>

    <br><br>

    <button class="btn" onclick="enviarWhatsApp()">
        Enviar por WhatsApp 💖
    </button>
</div>

    <div class="card">
        <a class="btn" href="https://wa.me/5492657390793?text=Confirmo%20asistencia%20a%20los%2015%20de%20Juli%20💖">Confirmar asistencia</a>
        <a class="btn" href="https://www.google.com/maps/place/Camping+ATSA/@-33.6919852,-65.4330234,14.5z/data=!4m14!1m7!3m6!1s0x95d16a6c33673db9:0x947da45dfb077574!2sATSA!8m2!3d-33.6892922!4d-65.4655386!16s%2Fg%2F11f3jwrr20!3m5!1s0x95d16b30dd5ffd1d:0x8549e58da536748e!8m2!3d-33.6973029!4d-65.4118855!16s%2Fg%2F11c60v__4b!18m1!1e1?entry=ttu&g_ep=EgoyMDI2MDQwMS4wIKXMDSoASAFQAw%3D%3D">Ver ubicación</a>
    </div>

    <div class="countdown" id="countdown"></div>

</div>

<script>
    const eventDate = new Date("Jan 16, 2027 21:00:00").getTime();

    const countdown = setInterval(() => {
        const now = new Date().getTime();
        const distance = eventDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));

        document.getElementById("countdown").innerHTML =
            "✨ Faltan " + days + " días ✨";

        if (distance < 0) {
            clearInterval(countdown);
            document.getElementById("countdown").innerHTML = "¡Es hoy! 💖";
        }
    }, 1000);
</script>
<script>
function enviarWhatsApp() {
    let mensaje = document.getElementById("mensaje").value;

    if (mensaje.trim() === "") {
        alert("Por favor escribí una canción 💕");
        return;
    }

    let numero = "5492657343275";
    let texto = encodeURIComponent("💖 Sugerencia de música: " + mensaje);

    let url = "https://wa.me/" + numero + "?text=" + texto;

    window.open(url, "_blank");
}
</script>

</body>
</html>
