        <h2>Juliana 💖</h2>
        <p>Te invito a celebrar este momento único</p>
    </div>

    <div class="card">
        <p>📅 5 de Enero</p>
        <p>🕒 21:00 hs</p>
        <p>📍 Salón Ejemplo</p>
    </div>

    <div class="card">
        <p>🌸 Dress code: Elegante</p>
    </div>

    <div class="card">
        <a class="btn" href="https://wa.me/549XXXXXXXXX?text=Confirmo%20asistencia%20💖">Confirmar asistencia</a>
        <a class="btn" href="https://maps.google.com">Ver ubicación</a>
    </div>

    <div class="countdown" id="countdown"></div>

</div>

<script>
    const eventDate = new Date("Jan 5, 2026 21:00:00").getTime();

    const countdown = setInterval(() => {
        const now = new Date().getTime();
        const distance = eventDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));

        document.getElementById("countdown").innerHTML =
            "✨ Faltan " + days + " días ✨";

        if (distance < 0) {
            clearInterval(countdown);
            document.getElementById("countdown").innerHTML = "¡Es hoy! 💖";
        }
    }, 1000);
</script>
