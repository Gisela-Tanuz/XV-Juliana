<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mis 15 - Juliana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@500;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<style>
    * { box-sizing: border-box; }

    body {
        margin: 0;
        font-family: 'Cormorant Garamond', serif;
        text-align: center;
        color: #f2e6ea;
        background: radial-gradient(circle at 50% 0%, #3a0821 0%, #14000a 55%, #000000 100%);
        overflow-x: hidden;
        letter-spacing: 0.5px;
    }

    .container {
        padding: 40px 20px 60px;
        max-width: 480px;
        margin: 0 auto;
    }

    .invite-wrap {
        position: relative;
        margin: 0 auto 20px;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid rgba(231, 154, 181, 0.4);
        box-shadow: 0 0 30px rgba(231, 154, 181, 0.25), 0 10px 30px rgba(0, 0, 0, 0.6);
    }

    .invite-wrap img {
        width: 100%;
        display: block;
    }

    .overlay {
        position: relative;
        
        bottom: 4%;
        padding: 12px 10px;
       
    }

    .overlay h3 {
        font-family: 'Playfair Display', serif;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-size: 0.75em;
        color: #e79ab5;
        margin: 0 0 8px;
        text-shadow: 0 1px 5px rgba(0, 0, 0, 0.95);
    }

    .countdown-grid {
        display: flex;
        justify-content: center;
        gap: 8px;
    }

    .countdown-grid div {
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(231, 154, 181, 0.4);
        border-radius: 8px;
        padding: 6px 8px;
        min-width: 42px;
    }

    .countdown-grid span {
        display: block;
        font-family: 'Playfair Display', serif;
        font-size: 1.15em;
        font-weight: 700;
        color: #ffffff;
        text-shadow: 0 1px 5px rgba(0, 0, 0, 0.95);
    }

    .countdown-grid small {
        font-size: 0.6em;
        letter-spacing: 1px;
        color: #e79ab5;
        text-transform: uppercase;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.95);
    }

    .btn {
        display: inline-block;
        margin: 14px 6px 0;
        padding: 12px 28px;
        background: linear-gradient(135deg, #e79ab5, #b5557a);
        color: #1a0510;
        border: none;
        border-radius: 24px;
        text-decoration: none;
        font-weight: 700;
        letter-spacing: 1px;
        cursor: pointer;
        font-family: 'Playfair Display', serif;
        font-size: 0.95em;
    }

    .btn:hover {
        background: linear-gradient(135deg, #f2b6cc, #c96d8f);
    }

    .btn-sm {
        margin: 0;
        padding: 8px 16px;
        font-size: 0.75em;
    }

    .overlay-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        margin-top: 10px;
    }
</style>
</head>

<body>

<div class="container">

    <div class="invite-wrap">
        <img src="img/fondo1.jpeg" alt="Invitación 15 años de Juliana">

      
    
      <div class="overlay">
            <h3>✧ Cuenta regresiva ✧</h3>
            <div class="countdown-grid" id="countdown"></div>
            <div class="overlay-actions">
                <button class="btn btn-sm" onclick="confirmarAsistencia()">Confirmar asistencia</button>
                <a class="btn btn-sm" href="https://www.google.com/maps/place/Camping+ATSA/@-33.6919852,-65.4330234,14.5z/data=!4m14!1m7!3m6!1s0x95d16a6c33673db9:0x947da45dfb077574!2sATSA!8m2!3d-33.6892922!4d-65.4655386!16s%2Fg%2F11f3jwrr20!3m5!1s0x95d16b30dd5ffd1d:0x8549e58da536748e!8m2!3d-33.6973029!4d-65.4118855!16s%2Fg%2F11c60v__4b!18m1!1e1?entry=ttu&g_ep=EgoyMDI2MDQwMS4wIKXMDSoASAFQAw%3D%3D" target="_blank">Ver ubicación</a>
            </div>
        </div>
        </div>
</div>

<script>
    const eventDate = new Date("Jan 16, 2027 21:00:00").getTime();
    const countdownEl = document.getElementById("countdown");

    function pad(n) {
        return String(n).padStart(2, "0");
    }

    const countdown = setInterval(() => {
        const now = new Date().getTime();
        const distance = eventDate - now;

        if (distance < 0) {
            clearInterval(countdown);
            countdownEl.innerHTML = "<div><span>💖</span><small>¡Es hoy!</small></div>";
            return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        countdownEl.innerHTML =
            "<div><span>" + days + "</span><small>días</small></div>" +
            "<div><span>" + pad(hours) + "</span><small>hs</small></div>" +
            "<div><span>" + pad(minutes) + "</span><small>min</small></div>" +
            "<div><span>" + pad(seconds) + "</span><small>seg</small></div>";
    }, 1000);
</script>
<script>
function confirmarAsistencia() {
    let nombre = prompt("¡Genial! ¿Cómo te llamás para avisarle a Juliana? 💖");

    if (nombre === null) {
        return;
    }

    if (nombre.trim() === "") {
        alert("Por favor escribí tu nombre 💕");
        return;
    }

    let numeroAnfitrion = "5492657390793";
    let texto = encodeURIComponent(nombre + " confirmó asistencia a los 15 de Juli 💖");
    let url = "https://wa.me/" + numeroAnfitrion + "?text=" + texto;

    window.open(url, "_blank");
    alert("¡Gracias " + nombre + "! Se envió tu confirmación a Juliana 🎉");
}

</script>

</body>
</html>
